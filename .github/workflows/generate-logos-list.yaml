name: Generate Logos List

on:
  push:
    branches: [ main, master ]
    paths:
      - 'logos/SNP/**/*.png'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find all SNP logos
        id: find_files
        run: |
          # Trova i file .png, estrai il nome senza estensione e ordina
          find logos/SNP -name "*.png" | sed 's|.*/||; s/\.png$//' | sort -u > logos_list.txt
          echo "logos_count=$(wc -l < logos_list.txt)" >> $GITHUB_OUTPUT

      - name: Display count
        run: echo "📊 Found ${{ steps.find_files.outputs.logos_count }} logos"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logos_list.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Update logos list (${{ steps.find_files.outputs.logos_count }} items)"
          git push
