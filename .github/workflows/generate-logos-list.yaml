name: Generate Logos List

on:
  push:
    branches: [ main, master ]
    paths:
      - 'logos/SNP/**/*.png'
  workflow_dispatch:   # permette esecuzione manuale

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate logos list (SNP)
        run: |
          find logos/SNP -name "*.png" -printf "%f\n" | sed 's/\.png$//' | sort > logos_list.txt

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logos_list.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Update logos list"
          git push